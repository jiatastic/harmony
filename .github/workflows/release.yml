name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_command: npm run build && npx electron-builder --mac --config.mac.identity=null --config.mac.hardenedRuntime=false --publish always
          - os: windows-latest
            build_command: npm run build && npx electron-builder --win --publish always
          - os: ubuntu-latest
            build_command: npm run build && npx electron-builder --linux --publish always

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release artifacts
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
